name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  build-test-pack:
    runs-on: windows-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $packageVersion = "$version.0"
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "PACKAGE_VERSION=$packageVersion" >> $env:GITHUB_ENV
          echo "Extracted version: $version"

      - name: Publish app (self-contained)
        run: |
          dotnet publish src\Hmy.Estao.App -c Release -r win-x64 --self-contained true -o publish\msix

      - name: Stage MSIX payload
        shell: pwsh
        env:
          ESTAO_MSIX_PUBLISHER: ${{ secrets.ESTAO_MSIX_PUBLISHER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ESTAO_MSIX_PUBLISHER)) {
            Write-Error "ESTAO_MSIX_PUBLISHER secret is not configured. It must match the Trusted Signing certificate subject."
            exit 1
          }

          Copy-Item "src\Hmy.Estao.Packaging\Package.appxmanifest" "publish\msix\AppxManifest.xml"
          Copy-Item -Recurse "src\Hmy.Estao.Packaging\Assets" "publish\msix\Assets"

          $manifest = "publish\msix\AppxManifest.xml"
          $document = [System.Xml.XmlDocument]::new()
          $document.PreserveWhitespace = $true
          $document.Load((Resolve-Path $manifest))
          $namespaceManager = [System.Xml.XmlNamespaceManager]::new($document.NameTable)
          $namespaceManager.AddNamespace("appx", "http://schemas.microsoft.com/appx/manifest/foundation/windows10")
          $identity = $document.SelectSingleNode("/appx:Package/appx:Identity", $namespaceManager)
          if (-not $identity) {
            Write-Error "MSIX manifest Identity element not found."
            exit 1
          }
          $identity.SetAttribute("Version", $env:PACKAGE_VERSION)
          $identity.SetAttribute("Publisher", $env:ESTAO_MSIX_PUBLISHER)
          $settings = [System.Xml.XmlWriterSettings]::new()
          $settings.Encoding = [System.Text.UTF8Encoding]::new($false)
          $settings.Indent = $false
          $writer = [System.Xml.XmlWriter]::Create((Resolve-Path $manifest), $settings)
          $document.Save($writer)
          $writer.Close()

      - name: Create unsigned MSIX
        shell: pwsh
        run: |
          $makeAppx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeAppx) {
            Write-Error "MakeAppx.exe not found"
            exit 1
          }
          $msixName = "Hmy.Estao_$env:VERSION`_x64.msix"
          echo "MSIX_FILENAME=$msixName" >> $env:GITHUB_ENV
          & $makeAppx pack /d publish\msix /p $msixName /l

      - name: Validate Azure login secrets
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          $guidPattern = '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          foreach ($name in @('AZURE_CLIENT_ID', 'AZURE_TENANT_ID', 'AZURE_SUBSCRIPTION_ID')) {
            $value = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($value)) {
              Write-Error "$name secret is not configured."
              exit 1
            }
            if ($value -notmatch $guidPattern) {
              Write-Error "$name must be a GUID. Use the Azure application client ID, Entra directory tenant ID, and subscription ID."
              exit 1
            }
          }

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign MSIX with Azure Artifact Signing
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_CERT_PROFILE }}
          files: ${{ github.workspace }}\${{ env.MSIX_FILENAME }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Generate AppInstaller
        shell: pwsh
        run: |
          $template = Get-Content "packaging\AppInstaller.template.xml" -Raw
          $template = $template `
            -replace '\$\{ESTAO_PACKAGE_VERSION\}', $env:PACKAGE_VERSION `
            -replace '\$\{ESTAO_VERSION\}', $env:VERSION `
            -replace '\$\{ESTAO_APPINSTALLER_URI\}', "${{ secrets.ESTAO_APPINSTALLER_URI }}" `
            -replace '\$\{ESTAO_MSIX_PUBLISHER\}', "${{ secrets.ESTAO_MSIX_PUBLISHER }}" `
            -replace '\$\{ESTAO_PACKAGE_URI\}', "${{ secrets.ESTAO_PACKAGE_URI }}"
          $appInstallerName = "Hmy.Estao_$env:VERSION`_x64.appinstaller"
          echo "APPINSTALLER_FILENAME=$appInstallerName" >> $env:GITHUB_ENV
          Set-Content -Path $appInstallerName -Value $template

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Estao ${{ env.VERSION }}
          body_path: ""
          body: |
            ## Estao ${{ env.VERSION }}

            ### Installation
            Download `${{ env.MSIX_FILENAME }}` and double-click to install.

            ### App Installer (auto-update)
            Point your browser to `https://hmygroup.github.io/Hmy.Estao/estao.appinstaller` to install with automatic update checks.
          files: |
            ${{ env.MSIX_FILENAME }}
            ${{ env.APPINSTALLER_FILENAME }}
          generate_release_notes: true

      - name: Prepare GitHub Pages deploy
        shell: pwsh
        run: |
          $deployDir = "gh-pages-deploy"
          New-Item -ItemType Directory -Path $deployDir -Force | Out-Null
          Copy-Item "$env:MSIX_FILENAME" $deployDir
          Copy-Item "$env:APPINSTALLER_FILENAME" $deployDir
          # Fixed-name AppInstaller so the URL never changes
          Copy-Item "$env:APPINSTALLER_FILENAME" "$deployDir\estao.appinstaller"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          keep_files: true